# yaml-language-server: $schema=https://lich.dev/schema/v1.json
# Target lich.yaml for the dogfood stack.
# This file is what lich must handle by end of v1.
# Until then, lich up against this config is the failing test case.

version: "1"

runtime:
  # Plan 1: auto picks docker / podman / nerdctl from PATH. Pinned
  # explicitly to document the dogfood-stack's expectation; `auto` is
  # the default but having the block here exercises the runtime parser.
  compose_cli: auto
  # The daemon's reverse proxy port (Plan 5). 3300 is also the default;
  # pinning makes friendly URLs deterministic across test environments.
  proxy_port: 3300

services:
  # Plan 1 compose services. Demonstrates the unowned (docker-compose-
  # managed) side of the stack. Both services are simple, fast to pull,
  # and have well-known healthchecks — chosen to keep e2e setup time low.
  redis:
    image: redis:7-alpine
    ports:
      - { container: 6379, env: REDIS_HOST_PORT }
    environment: {}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 30

  mailhog:
    # Multi-port compose service: 1025 SMTP + 8025 HTTP UI. Exercises
    # the per-port `env:` mapping pattern, distinct from the single-port
    # shape redis uses above.
    image: mailhog/mailhog:latest
    ports:
      - { container: 1025, env: SMTP_HOST_PORT }
      - { container: 8025, env: MAILHOG_UI_PORT }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/api/v1/messages || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 20

owned:
  supabase:
    cmd: supabase start
    cwd: .
    oneshot: true
    stop_cmd: supabase stop
    env:
      # Per-worktree supabase project_id so parallel lich stacks don't
      # collide on the same set of docker containers. The supabase CLI
      # honors this env var at runtime, overriding supabase/config.toml's
      # project_id. ${worktree.id} is the 12-hex-char stable hash of the
      # worktree's absolute path.
      SUPABASE_PROJECT_ID: "dogfood-${worktree.id}"
    ports:
      api: { env: SUPABASE_API_PORT }
      db: { env: SUPABASE_DB_PORT }
      db_shadow: { env: SUPABASE_DB_SHADOW_PORT }
      db_pooler: { env: SUPABASE_DB_POOLER_PORT }
      studio: { env: SUPABASE_STUDIO_PORT }
      inbucket: { env: SUPABASE_INBUCKET_PORT }
      analytics: { env: SUPABASE_ANALYTICS_PORT }
    ready_when:
      tcp: "localhost:${owned.supabase.ports.api}"
      # Plan 4 (LEV-368): supabase start pulls images on first run and brings
      # up ~10 containers. 90s was tight on cold-cache machines; 120s gives
      # headroom without masking a real hang (the timeout still fires loudly
      # if startup actually wedges).
      timeout: 120s

  api:
    cmd: bun run dev
    cwd: apps/api
    port: { env: PORT }
    depends_on: [supabase]
    ready_when:
      http_get: /health
      timeout: 30s
    fail_when:
      # Plan 4 fail_when demo: the Express dev server prints `EADDRINUSE` when
      # the host port is occupied, and Node prints `Cannot find module` when a
      # require/import resolves to nothing. Either failure mode means waiting
      # on `ready_when.http_get` is pointless — fail_when short-circuits the
      # ready loop and surfaces the offending log line inline.
      log_match: "EADDRINUSE|Cannot find module"

  web:
    cmd: bun run dev
    cwd: apps/web
    port: { env: PORT }
    depends_on: [api]
    ready_when:
      # Next.js dev server responds 200 on / once compilation finishes.
      # More robust than log-matching framework cosmetic output.
      http_get: /
      timeout: 60s

  # Plan 4 (LEV-368) ready_when.capture demo. Purely synthetic — this service
  # exists to exercise the capture path end-to-end against a real owned
  # process. The `echo … ; sleep 99999` pattern is deliberate: emit a log line
  # that satisfies `ready_when.log_match`, then hang so the service stays
  # alive (so `lich up` completes and downstream services / `lich env stack`
  # can read the captured value). A future Plan 5 dashboard task reuses the
  # same service for the "live log tail" demo.
  tunnel_demo:
    cmd: 'echo "starting"; sleep 0.5; echo "Listening on http://localhost:54999 (demo)"; sleep 99999'
    ready_when:
      log_match: "Listening on"
      capture:
        # Pull the URL out of the emitted log line and expose it as
        # `${owned.tunnel_demo.captured.listen_url}` (used below in `env`).
        # The literal port (54999) is hard-coded in `cmd` above — capture
        # demonstrates the regex extraction, not dynamic port allocation.
        listen_url: "http://localhost:\\d+"
    fail_when:
      # Sentinel patterns a real tunnel agent would emit on hard failure.
      # tunnel_demo never emits these, so this is purely shape-coverage for
      # the schema + watcher wiring.
      log_match: "PANIC|FATAL"

env:
  # Supabase wiring (used by the API to talk to Supabase)
  NEXT_PUBLIC_SUPABASE_URL: "http://localhost:${owned.supabase.ports.api}"
  # Local anon key — Supabase generates a deterministic one per project_id, so
  # pasting once from Task 9 step 4 is fine for dev.
  SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0"

  # API wiring (used by the web app to call the API)
  API_URL: "http://localhost:${owned.api.port}"

  # Postgres connection (for migrate/seed via psql)
  DATABASE_URL: "postgresql://postgres:postgres@localhost:${owned.supabase.ports.db}/postgres"

  # Plan 1 compose-port interpolations. The api uses REDIS_URL opt-in
  # (no hard depends_on) so dev:lite can exclude redis cleanly.
  #
  # `${services.<name>.host_port}` resolves to the FIRST declared port for
  # that compose service (per `interpolation.ts` SUPPORTED_SHAPES). For
  # mailhog that's port 1025 (SMTP), declared before 8025 (UI). The
  # multi-port shape `${services.<name>.ports.<key>}` is documented in
  # the spec for compose services but the interpolation engine only
  # ships the `host_port` (primary) form — so `SMTP_URL` uses
  # `services.mailhog.host_port` and the UI URL is intentionally omitted
  # here (deferred until the engine adds multi-port resolution for
  # compose services).
  REDIS_URL: "redis://localhost:${services.redis.host_port}"
  SMTP_URL: "smtp://localhost:${services.mailhog.host_port}"

env_groups:
  # Pattern C — "stack PLUS extras." Inherits the full resolved stack env
  # (top-level env + ports + interpolated values) and layers an extra literal
  # on top. Useful for integration tests that need stack wiring plus an extra
  # flag.
  stack-plus-test:
    extends: stack
    env:
      TEST_MODE: "integration"

  # Pattern B — "isolated standalone group." NO extends, so stack env does not
  # leak in. `process_env: false` also blocks the user's shell env, giving a
  # hermetic resolution. Exercised by the `tools:env-check` command below so
  # e2e tests can prove the isolation guarantee.
  isolated-tools:
    process_env: false
    env:
      TOOL_MODE: "standalone"

lifecycle:
  # Long-form `after_up` entry exercises Plan 2 Task 13's env_group wiring
  # (LEV-345 sentinel): the hook runs with the resolved `stack-plus-test`
  # group's env (inherits `stack` vars + adds `TEST_MODE=integration`), and
  # the e2e test in tests/e2e/lifecycle-env-group.test.ts asserts the marker
  # file the script writes contains both the inherited DATABASE_URL and the
  # layered TEST_MODE. If this hook ever silently drops back to the top-level
  # env, TEST_MODE would be empty and the e2e test would fail loudly.
  after_up:
    - cmd: ./scripts/write-marker.sh
      env_group: stack-plus-test

profiles:
  dev:
    default: true
    # `tunnel_demo` is included so `lich up` exercises the Plan 4 capture
    # pipeline on every dev run — the captured listen_url flows into
    # TUNNEL_DEMO_URL (see `env` above) before the after_up hooks fire.
    owned: [supabase, api, web, tunnel_demo]
    # Plan 1 compose services — both included here so the dev profile
    # exercises the full compose pipeline (override file, port bindings,
    # healthcheck waits) in every `lich up`. `dev:lite` (added later in
    # the expansion plan) trims these out for the fast-iteration path.
    services: [redis, mailhog]
    lifecycle:
      after_up:
        - supabase migration up
        - psql "$DATABASE_URL" -f supabase/seed.sql

  # Plan 3 Task 18 demo: profile-scoped env precedence (LEV-392).
  # Inherits `dev`'s owned list AND its lifecycle via `extends: dev`, so the
  # same services start and the same after_up hooks run — only the env values
  # below override what dev resolved. This exercises the layering rule
  # (top-level → profile → per-service) without the per-profile depends_on
  # tangle that an exclude-services profile would create against the api's
  # `depends_on: [supabase]`. The hostnames are intentionally non-resolving;
  # e2e coverage asserts on the env Lich resolved (via `lich exec`), not on
  # actually opening a DB connection. The "test-env without supabase"
  # scenario (excluding services) is deferred to a Plan 3.x follow-up that
  # adds per-profile depends_on overrides.
  dev:env-override:
    extends: dev
    env:
      DATABASE_URL: "postgresql://postgres:test@db.test.example.com:5432/postgres"
      NEXT_PUBLIC_SUPABASE_URL: "https://test.example.com"

commands:
  test:e2e:
    cmd: echo "no e2e tests in dogfood-stack yet"
    help: |
      Placeholder for the dogfood-stack's own e2e tests.
      Real tests come once the stack is working under lich.

  db:psql:
    cmd: psql "$DATABASE_URL"
    help: |
      Open a psql shell against the local Supabase Postgres.

  tools:env-check:
    cmd: printenv TOOL_MODE TEST_MODE LICH_WORKTREE
    env_group: isolated-tools
    help: |
      Diagnostic: print the env vars that should be visible under the
      `isolated-tools` env_group. Used by e2e tests to verify env_group
      resolution end-to-end — because `isolated-tools` does NOT extend
      `stack`, only TOOL_MODE should be set; TEST_MODE and DATABASE_URL
      should be absent.
