# Compose file for the dogfood-stack's postgres service.
#
# Lich's compose override generator (packages/lich/src/compose/override.ts)
# only writes per-stack port bindings + env overrides — it doesn't emit
# the service definition itself. Compose needs a base file with the
# `image:` + healthcheck. This is that file.
#
# Lich's per-stack override file (auto-generated under
# `~/.lich/stacks/<id>/compose.override.yaml`) layers on top of this and
# supplies the host-port binding + any per-stack env values resolved from
# the lich.yaml's `env:` block.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dogfood
    tmpfs:
      # Ephemeral data directory — postgres state lives in RAM and goes
      # away when the container is removed. Tests get a clean DB per
      # `lich down → lich up` cycle without manual volume management.
      # See docs/superpowers/specs/2026-05-25-e2e-suite-solid-and-fast-design.md
      # Section 8 for rationale.
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dogfood"]
      interval: 1s
      timeout: 1s
      retries: 30
