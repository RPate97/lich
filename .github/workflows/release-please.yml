name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Must be a PAT (or GitHub App token), NOT secrets.GITHUB_TOKEN.
          # Events triggered by GITHUB_TOKEN don't fire downstream workflows
          # (GitHub anti-loop protection), so release.yml never runs when
          # release-please publishes a release. Using a PAT here makes the
          # `release: published` event count as "external" and triggers
          # release.yml normally.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
