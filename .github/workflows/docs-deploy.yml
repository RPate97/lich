# Build the lich docs site and upload the result as an artifact.
#
# V0 status (LEV-507): this workflow only BUILDS the site. It does not
# deploy anywhere. Once the user picks a deploy target (Cloudflare Pages,
# Vercel, GitHub Pages, Netlify, etc.) and registers a domain, swap the
# upload-pages-artifact / Pages deploy job in below, or wire the artifact
# into a downstream deploy job.
#
# Triggers on pushes to main that touch either the site itself OR the
# skill references the site syncs from. Also exposes a manual trigger
# from the Actions tab for ad-hoc rebuilds.

name: docs-deploy

on:
  push:
    branches: [main]
    paths:
      - "docs/site/**"
      - "skills/lich-instrument/references/**"
      - ".github/workflows/docs-deploy.yml"
  pull_request:
    paths:
      - "docs/site/**"
      - "skills/lich-instrument/references/**"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # vitepress lastUpdated reads git history

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/site/package-lock.json

      - name: Install
        working-directory: docs/site
        run: npm ci --no-audit --no-fund

      - name: Build docs (generate + sync)
        run: |
          cd packages/lich && bun install --frozen-lockfile
          cd packages/lich && bun run build:docs

      - name: Verify mirrors are committed
        run: |
          if [ -n "$(git status --porcelain docs/site/reference docs/site/recipes skills/lich-instrument/references)" ]; then
            echo "::error::Mirrors are stale. Run 'cd packages/lich && bun run sync-content' and commit the results."
            git status docs/site/reference docs/site/recipes skills/lich-instrument/references
            git diff docs/site/reference docs/site/recipes skills/lich-instrument/references
            exit 1
          fi

      - name: Build
        working-directory: docs/site
        run: npx vitepress build

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/site/.vitepress/dist/
          retention-days: 14
          if-no-files-found: error

      # ---------------------------------------------------------------
      # TODO(user): wire this artifact to a real deploy target.
      #
      # Cloudflare Pages example:
      #   - uses: cloudflare/pages-action@v1
      #     with:
      #       apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      #       accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      #       projectName: lich-docs
      #       directory: docs/site/.vitepress/dist
      #       branch: main
      #
      # GitHub Pages example (enable Pages → Source: GitHub Actions first):
      #   - uses: actions/upload-pages-artifact@v3
      #     with:
      #       path: docs/site/.vitepress/dist
      #   (then a separate deploy job using actions/deploy-pages@v4)
      #
      # Vercel example:
      #   - run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
      #
      # For now this workflow only proves the build is green — pick a
      # target and add the deploy step when ready.
      # ---------------------------------------------------------------
