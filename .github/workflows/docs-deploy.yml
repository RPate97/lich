# Build the lich docs site and deploy to GitHub Pages.
#
# One-time GitHub setup: Settings → Pages → Source: "GitHub Actions".
# The deploy job runs only on main; pull_request runs build-only for
# preview validation.

name: docs-deploy

on:
  push:
    branches: [main]
    paths:
      - "docs/site/**"
      - "skills/lich-instrument/references/**"
      - ".github/workflows/docs-deploy.yml"
  pull_request:
    paths:
      - "docs/site/**"
      - "skills/lich-instrument/references/**"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # vitepress lastUpdated reads git history

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/site/package-lock.json

      - name: Install
        working-directory: docs/site
        run: npm ci --no-audit --no-fund

      - name: Build docs (generate + sync)
        run: |
          cd packages/lich && bun install --frozen-lockfile
          cd packages/lich && bun run build:docs

      - name: Verify mirrors are committed
        run: |
          if [ -n "$(git status --porcelain docs/site/reference docs/site/recipes skills/lich-instrument/references)" ]; then
            echo "::error::Mirrors are stale. Run 'cd packages/lich && bun run sync-content' and commit the results."
            git status docs/site/reference docs/site/recipes skills/lich-instrument/references
            git diff docs/site/reference docs/site/recipes skills/lich-instrument/references
            exit 1
          fi

      - name: Build
        working-directory: docs/site
        run: npx vitepress build

      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
