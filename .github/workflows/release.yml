# Manual release fallback — for emergencies only. The normal release flow
# is fully automated inside release-please.yml (release-please creates a
# draft, the same workflow run builds binaries and publishes the draft).
#
# Use this workflow when:
#   - A platform's build failed during the automated flow and you need to
#     rebuild + attach binaries to an existing release.
#   - You need to ship a release without going through release-please
#     (e.g. emergency hotfix tagged manually).
#
# Invocation: Actions tab -> "release" -> Run workflow -> enter version.

name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0, no v prefix)."
        required: true
        type: string
      prerelease:
        description: "Mark this release as a pre-release"
        type: boolean
        default: false
      draft:
        description: "Create/leave the release as a draft (review before publishing)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target.name }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: darwin-arm64
            bun_target: bun-darwin-arm64
            runner: macos-14
          - name: darwin-x64
            bun_target: bun-darwin-x64
            runner: macos-15-intel
          - name: linux-arm64
            bun_target: bun-linux-arm64
            runner: ubuntu-24.04-arm
          - name: linux-x64
            bun_target: bun-linux-x64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.target.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Setup Node (for UI build)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root deps
        run: bun install --frozen-lockfile

      - name: Sync version.ts
        run: |
          sed -i.bak 's/export const VERSION = .*/export const VERSION = "${{ inputs.version }}"; \/\/ x-release-please-version/' packages/lich/src/version.ts && rm packages/lich/src/version.ts.bak

      - name: Build dashboard UI (Vite)
        run: bun run --cwd packages/lich build:ui

      - name: Embed UI manifest
        run: bun run --cwd packages/lich build:ui:embed

      - name: Cross-compile lich CLI
        run: |
          cd packages/lich
          bun build --compile --target=${{ matrix.target.bun_target }} \
            --outfile=dist/lich src/bin/lich.ts

      - name: Cross-compile lich daemon
        run: |
          cd packages/lich
          bun build --compile --target=${{ matrix.target.bun_target }} \
            --outfile=dist/lich-daemon src/bin/lich-daemon.ts

      - name: Verify binaries
        run: |
          cd packages/lich
          file dist/lich dist/lich-daemon
          ls -lh dist/lich dist/lich-daemon

      - name: Package tarball
        run: |
          cd packages/lich/dist
          tar czf lich-${{ matrix.target.name }}.tar.gz lich lich-daemon
          shasum -a 256 lich-${{ matrix.target.name }}.tar.gz \
            > lich-${{ matrix.target.name }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lich-${{ matrix.target.name }}
          path: |
            packages/lich/dist/lich-${{ matrix.target.name }}.tar.gz
            packages/lich/dist/lich-${{ matrix.target.name }}.tar.gz.sha256
          retention-days: 7

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: ls -lh artifacts/

      - name: Attach assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/lich-*.tar.gz
            artifacts/lich-*.tar.gz.sha256
          fail_on_unmatched_files: true
