version: "1"
owned:
  tunnel:
    # Synthetic tunnel-style service modeled on the dogfood-stack `tunnel_demo`
    # capture example (docs/superpowers/plans/2026-05-23-lich-v1-plan-4 Task 19).
    cmd: 'echo "Listening on http://localhost:54999"; sleep 99999'
    ready_when:
      log_match: "Listening on"
      capture:
        # Same unterminated-character-class as the fail_when fixture so the
        # validate output is symmetric across the two regex sources.
        url: "[invalid("
