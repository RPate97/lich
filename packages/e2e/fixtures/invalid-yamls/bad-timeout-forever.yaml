version: "1"
owned:
  api:
    cmd: bun run dev
    cwd: apps/api
    port: { env: PORT }
    ready_when:
      http_get: /health
      # `forever` is the canonical user typo — fails the schema's duration
      # pattern (`^[0-9]+(ms|s|m|h)?$`) AND the integer branch, so the user
      # sees the schema error at validate time rather than at service-start.
      timeout: "forever"
